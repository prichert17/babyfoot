<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BabyFoot ELO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">

  <!-- SIDEBAR NAV -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">⚽</span>
      <span class="logo-text">BABY<br><em>ELO</em></span>
    </div>
    <ul class="nav-links">
      <li><button class="nav-btn active" data-view="ranking"><span class="nav-icon">🏆</span><span>Classement</span></button></li>
      <li><button class="nav-btn" data-view="add-match"><span class="nav-icon">➕</span><span>Nouveau Match</span></button></li>
      <li><button class="nav-btn" data-view="matches"><span class="nav-icon">📋</span><span>Historique</span></button></li>
      <li><button class="nav-btn" data-view="add-player"><span class="nav-icon">👤</span><span>Joueurs</span></button></li>
    </ul>
    <div class="sidebar-footer">
      <button id="export-csv-btn" class="export-btn"><span>⬇</span> Export CSV</button>
    </div>
  </nav>

  <!-- MOBILE TOP BAR -->
  <header id="mobile-header">
    <div class="mobile-logo">⚽ BABY<em>ELO</em></div>
    <button id="mobile-menu-toggle">☰</button>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content">

    <!-- === VIEW: RANKING === -->
    <section id="view-ranking" class="view active">
      <div class="view-header">
        <h1 class="view-title">CLASSEMENT <em>ELO</em></h1>
        <p class="view-subtitle">Saison en cours</p>
      </div>
      <!-- ELO EVOLUTION CHART -->
      <div class="elo-chart-container" id="elo-chart-container">
        <div class="elo-chart-title">ÉVOLUTION ELO</div>
        <canvas id="elo-global-chart"></canvas>
        <div class="chart-legend" id="chart-legend"></div>
      </div>
      <div id="ranking-list" class="ranking-list"></div>
    </section>

    <!-- === VIEW: ADD MATCH === -->
    <section id="view-add-match" class="view">
      <div class="view-header">
        <h1 class="view-title">NOUVEAU <em>MATCH</em></h1>
        <p class="view-subtitle">Enregistrer une partie</p>
      </div>
      <div class="match-form-container">
        <div class="mode-selector">
          <button class="mode-btn active" id="mode-1v1">1V1</button>
          <button class="mode-btn" id="mode-2v2">2V2</button>
        </div>
        <div class="teams-container">
          <div class="team-card team-a">
            <div class="team-label">ÉQUIPE A</div>
            <div class="player-slots" id="team-a-slots">
              <div class="player-slot" data-team="a" data-slot="0">
                <select class="player-select" id="team-a-0"><option value="">— Joueur —</option></select>
                <div class="role-selector hidden" id="role-a-0">
                  <button class="role-btn active" data-role="attaque">⚔ ATT</button>
                  <button class="role-btn" data-role="defense">🛡 DEF</button>
                </div>
              </div>
              <div class="player-slot hidden" data-team="a" data-slot="1">
                <select class="player-select" id="team-a-1"><option value="">— Joueur —</option></select>
                <div class="role-selector" id="role-a-1">
                  <button class="role-btn" data-role="attaque">⚔ ATT</button>
                  <button class="role-btn active" data-role="defense">🛡 DEF</button>
                </div>
              </div>
            </div>
            <div class="score-input-wrap">
              <label>SCORE</label>
              <input type="number" class="score-input" id="score-a" min="0" max="99" value="0" />
            </div>
          </div>
          <div class="vs-divider">VS</div>
          <div class="team-card team-b">
            <div class="team-label">ÉQUIPE B</div>
            <div class="player-slots" id="team-b-slots">
              <div class="player-slot" data-team="b" data-slot="0">
                <select class="player-select" id="team-b-0"><option value="">— Joueur —</option></select>
                <div class="role-selector hidden" id="role-b-0">
                  <button class="role-btn active" data-role="attaque">⚔ ATT</button>
                  <button class="role-btn" data-role="defense">🛡 DEF</button>
                </div>
              </div>
              <div class="player-slot hidden" data-team="b" data-slot="1">
                <select class="player-select" id="team-b-1"><option value="">— Joueur —</option></select>
                <div class="role-selector" id="role-b-1">
                  <button class="role-btn" data-role="attaque">⚔ ATT</button>
                  <button class="role-btn active" data-role="defense">🛡 DEF</button>
                </div>
              </div>
            </div>
            <div class="score-input-wrap">
              <label>SCORE</label>
              <input type="number" class="score-input" id="score-b" min="0" max="99" value="0" />
            </div>
          </div>
        </div>
        <div class="form-field">
          <label for="match-date">DATE DU MATCH</label>
          <input type="datetime-local" id="match-date" />
        </div>
        <div class="form-field">
          <label for="match-comment">COMMENTAIRE <span class="optional">(optionnel)</span></label>
          <textarea id="match-comment" rows="2" placeholder="Une anecdote sur ce match ?"></textarea>
        </div>
        <div id="elo-preview" class="elo-preview hidden">
          <div class="elo-preview-title">Impact ELO estimé</div>
          <div id="elo-preview-content"></div>
        </div>
        <button id="submit-match-btn" class="submit-btn">⚡ ENREGISTRER LE MATCH</button>
      </div>
    </section>

    <!-- === VIEW: MATCHES HISTORY === -->
    <section id="view-matches" class="view">
      <div class="view-header">
        <h1 class="view-title">HISTORIQUE <em>MATCHS</em></h1>
        <p class="view-subtitle">Tous les matchs enregistrés</p>
      </div>
      <div id="matches-list" class="matches-list"></div>
    </section>

    <!-- === VIEW: PLAYERS === -->
    <section id="view-add-player" class="view">
      <div class="view-header">
        <h1 class="view-title">GESTION <em>JOUEURS</em></h1>
        <p class="view-subtitle">Ajouter ou modifier des joueurs</p>
      </div>
      <div class="add-player-form">
        <div class="form-field">
          <label for="new-player-name">PSEUDO</label>
          <input type="text" id="new-player-name" placeholder="Ex: KingPong42" maxlength="30" />
        </div>
        <button id="add-player-btn" class="submit-btn">➕ AJOUTER</button>
      </div>
      <div class="players-grid" id="players-grid"></div>
    </section>

  </main>
</div>

<!-- MODAL: EDIT MATCH -->
<div id="edit-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h2>MODIFIER LE MATCH</h2>
      <button id="close-modal-btn">✕</button>
    </div>
    <div id="edit-modal-body"></div>
  </div>
</div>

<!-- MODAL: ELO DETAIL (match history) -->
<div id="elo-detail-modal" class="modal-overlay hidden">
  <div class="modal-box modal-box--sm">
    <div class="modal-header">
      <h2>DÉTAIL ELO</h2>
      <button class="close-elo-detail-btn">✕</button>
    </div>
    <div id="elo-detail-body" style="padding:24px"></div>
  </div>
</div>

<!-- MODAL: PLAYER PROFILE -->
<div id="player-profile-modal" class="modal-overlay hidden">
  <div class="modal-box modal-box--lg">
    <div class="modal-header" id="player-profile-header">
      <h2 id="player-profile-title">PROFIL JOUEUR</h2>
      <button id="close-profile-btn">✕</button>
    </div>
    <div id="player-profile-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="js/storage.js"></script>
<script src="js/elo.js"></script>
<script src="js/chart.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
