<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 BabyFoot ELO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="css/style2.css" />

</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <nav id="sidebar">
  <div class="sidebar-logo">
      <span class="logo-icon">⚽</span>
      <span class="logo-text">BABY<br><em>ELO</em></span>
    </div>
    <button class="active" onclick="showPage('dashboard')">🏠 Accueil</button>
    <button onclick="showPage('add-match')">➕ Nouveau match</button>
    <button onclick="showPage('matches')">📋 Historique</button>
    <button onclick="showPage('ranking')">🏆 Classement</button>
    <button onclick="showPage('players')">👥 Joueurs</button>
  </nav>
</header>

  <header id="mobile-header">
    <div class="mobile-logo">⚽ BABY<em>ELO</em></div>
    <button id="mobile-menu-toggle">☰</button>
  </header>




<main id="main-content">

<!-- ══ PAGE : DASHBOARD ══ -->
<div id="page-dashboard" class="page active">
  <div class="page-header">
    <h1>TABLEAU DE BORD</h1>
    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 Exporter CSV</button>
  </div>

  <div class="dashboard-grid" id="kpi-grid"></div>

  <div class="card">
    <div class="card-title">📈 ÉVOLUTION ELO</div>
    <div class="chart-container"><canvas id="elo-chart"></canvas></div>
  </div>

  <div class="card">
    <div class="card-title">⚡ DERNIERS MATCHS</div>
    <div id="recent-matches"></div>
  </div>
</div>

<!-- ══ PAGE : NOUVEAU MATCH ══ -->
<div id="page-add-match" class="page">
  <div class="page-header"><h1>NOUVEAU MATCH</h1></div>

  <div id="add-match-alert"></div>

  <div class="card">
    <div class="card-title">FORMAT</div>
    <div class="format-toggle">
      <button class="active" id="btn-1v1" onclick="setFormat('1v1')">1 V 1</button>
      <button id="btn-2v2" onclick="setFormat('2v2')">2 V 2</button>
    </div>
  </div>

  <div class="team-area" id="team-area">
    <div class="team-card" id="team-a-card">
      <div class="team-label">⚔️ Équipe A</div>
      <div id="team-a-players"></div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="team-card" id="team-b-card">
      <div class="team-label">🛡️ Équipe B</div>
      <div id="team-b-players"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">SCORE</div>
    <div class="score-inputs">
      <input type="number" id="score-a" class="score-input" value="0" min="0" max="99">
      <span class="score-sep">–</span>
      <input type="number" id="score-b" class="score-input" value="0" min="0" max="99">
    </div>
  </div>

  <div class="card">
    <div class="card-title">DATE & COMMENTAIRE</div>
    <div class="form-grid">
      <div>
        <label>Date du match</label>
        <input type="datetime-local" id="match-date">
      </div>
      <div>
        <label>Commentaire (optionnel)</label>
        <textarea id="match-comment" placeholder="Un commentaire sur le match..."></textarea>
      </div>
    </div>
  </div>

  <button class="btn btn-primary" onclick="saveMatch()" style="width:100%;justify-content:center;padding:14px;">
    🏆 Enregistrer le match
  </button>
</div>

<!-- ══ PAGE : HISTORIQUE ══ -->
<div id="page-matches" class="page">
  <div class="page-header">
    <h1>HISTORIQUE</h1>
    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 CSV</button>
  </div>

  <div class="filter-bar">
    <div class="search-box">
      <input type="text" id="match-search" placeholder="Rechercher un joueur…" oninput="renderMatches()">
    </div>
    <select id="match-filter-format" onchange="renderMatches()" style="width:auto;">
      <option value="">Tous formats</option>
      <option value="1v1">1v1</option>
      <option value="2v2">2v2</option>
    </select>
  </div>

  <div id="matches-list"></div>
</div>

<!-- ══ PAGE : CLASSEMENT ══ -->
<div id="page-ranking" class="page">
  <div class="page-header"><h1>CLASSEMENT ELO</h1></div>
  <div class="card" style="padding:0;overflow:hidden;">
    <table class="ranking-table" id="ranking-table">
      <thead>
        <tr>
          <th style="width:50px">#</th>
          <th>Joueur</th>
          <th>ELO</th>
          <th>Matchs</th>
          <th>V%</th>
          <th>1v1</th>
          <th>2v2</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="ranking-body"></tbody>
    </table>
  </div>
</div>

<!-- ══ PAGE : JOUEURS ══ -->
<div id="page-players" class="page">
  <div class="page-header">
    <h1>JOUEURS</h1>
  </div>

  <div class="card" style="margin-bottom:24px;">
    <div class="card-title">AJOUTER UN JOUEUR</div>
    <div style="display:flex;gap:12px;align-items:flex-end;">

</div>

</main>

<!-- ══════════ MODALS ══════════ -->

<!-- Modal : édition match -->
<div class="modal-overlay" id="modal-edit-match">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-edit-match')">✕</button>
    <div class="modal-title">MODIFIER LE MATCH</div>
    <div id="edit-match-content"></div>
  </div>
</div>

<!-- Modal : ELO détail match -->
<div class="modal-overlay" id="modal-elo-detail">
  <div class="modal" style="max-width:480px;">
    <button class="modal-close" onclick="closeModal('modal-elo-detail')">✕</button>
    <div class="modal-title">DÉTAIL ELO</div>
    <div id="elo-detail-content"></div>
  </div>
</div>

<!-- Modal : stats joueur -->
<div class="modal-overlay" id="modal-player-stats">
  <div class="modal" style="max-width:800px;">
    <button class="modal-close" onclick="closeModal('modal-player-stats')">✕</button>
    <div id="player-stats-content"></div>
  </div>
</div>

<!-- Modal : admin password -->
<div class="modal-overlay" id="modal-admin">
  <div class="modal" style="max-width:400px;">
    <button class="modal-close" onclick="closeModal('modal-admin')">✕</button>
    <div class="modal-title">🔐 ACCÈS ADMIN</div>
    <div id="admin-alert"></div>
    <label>Mot de passe</label>
    <input type="password" id="admin-password" placeholder="Mot de passe admin…" onkeydown="if(event.key==='Enter')confirmAdmin()">
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:12px;" onclick="confirmAdmin()">Confirmer</button>
  </div>
</div>

<!-- Modal : renommer joueur -->
<div class="modal-overlay" id="modal-rename">
  <div class="modal" style="max-width:400px;">
    <button class="modal-close" onclick="closeModal('modal-rename')">✕</button>
    <div class="modal-title">✏️ RENOMMER</div>
    <label>Nouveau pseudo</label>
    <input type="text" id="rename-input" placeholder="Nouveau pseudo…" maxlength="30">
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:12px;" onclick="confirmRename()">Renommer</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════════════

const ADMIN_PASSWORD = 'admindaph';
const BASE_ELO = 1200;
const K = 32;

let db = {
  players: [],
  matches: []
};

function save() { localStorage.setItem('babyfootdb', JSON.stringify(db)); }

function load() {
  const raw = localStorage.getItem('babyfootdb');
  if (raw) db = JSON.parse(raw);
}

load();

// Assign color if missing
const PLAYER_COLORS = [
  '#f0c040','#f05060','#30d090','#4090f0','#e07020','#a060f0',
  '#40d0f0','#f08040','#60d040','#f040c0','#c0d040','#4040f0'
];

function getOrAssignColor(player) {
  if (!player.color) {
    const used = db.players.map(p => p.color);
    const available = PLAYER_COLORS.filter(c => !used.includes(c));
    player.color = available.length ? available[0] : `hsl(${Math.random()*360|0},70%,55%)`;
  }
  return player.color;
}

// ═══════════════════════════════════════════════
//  ELO CALCULATION
// ═══════════════════════════════════════════════

function expectedScore(ra, rb) {
  return 1 / (1 + Math.pow(10, (rb - ra) / 400));
}

function computeEloDeltas(match) {
  // Recalculates match ELO deltas based on ELO *at the time* of that match
  // We'll do a full replay each time we need accurate ELO history
  return null; // handled in replayElo
}

function replayElo() {
  // Reset
  db.players.forEach(p => { p.elo = BASE_ELO; p.eloHistory = [{ match: 0, elo: BASE_ELO, date: null }]; });

  const sorted = [...db.matches].sort((a, b) => new Date(a.date) - new Date(b.date));

  sorted.forEach((match, idx) => {
    const teamA = match.teamA;
    const teamB = match.teamB;

    const aIds = teamA.map(p => p.id);
    const bIds = teamB.map(p => p.id);

    const aPlayers = aIds.map(id => db.players.find(p => p.id === id)).filter(Boolean);
    const bPlayers = bIds.map(id => db.players.find(p => p.id === id)).filter(Boolean);

    if (!aPlayers.length || !bPlayers.length) return;

    const avgA = aPlayers.reduce((s, p) => s + p.elo, 0) / aPlayers.length;
    const avgB = bPlayers.reduce((s, p) => s + p.elo, 0) / bPlayers.length;

    const ea = expectedScore(avgA, avgB);
    const eb = expectedScore(avgB, avgA);

    const sa = match.scoreA > match.scoreB ? 1 : match.scoreA === match.scoreB ? 0.5 : 0;
    const sb = 1 - sa;

    const deltaA = Math.round(K * (sa - ea));
    const deltaB = Math.round(K * (sb - eb));

    // Store ELO before and after in match
    match._eloSnapshot = {
      A: aPlayers.map(p => ({ id: p.id, pseudo: p.pseudo, eloBefore: p.elo, eloAfter: p.elo + deltaA, delta: deltaA })),
      B: bPlayers.map(p => ({ id: p.id, pseudo: p.pseudo, eloBefore: p.elo, eloAfter: p.elo + deltaB, delta: deltaB }))
    };

    aPlayers.forEach(p => {
      p.elo += deltaA;
      p.eloHistory.push({ match: idx + 1, elo: p.elo, date: match.date });
    });
    bPlayers.forEach(p => {
      p.elo += deltaB;
      p.eloHistory.push({ match: idx + 1, elo: p.elo, date: match.date });
    });
  });
}

replayElo();

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const idx = ['dashboard','add-match','matches','ranking','players'].indexOf(page);
  document.querySelectorAll('nav button')[idx]?.classList.add('active');

  replayElo();

  if (page === 'dashboard') renderDashboard();
  if (page === 'add-match') initAddMatch();
  if (page === 'matches') renderMatches();
  if (page === 'ranking') renderRanking();
  if (page === 'players') renderPlayers();
}

// ═══════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════

let eloChartInstance = null;

function renderDashboard() {
  // KPIs
  const kpiGrid = document.getElementById('kpi-grid');
  const nbMatches = db.matches.length;
  const nbPlayers = db.players.length;
  const leader = db.players.length ? db.players.reduce((a, b) => a.elo > b.elo ? a : b) : null;
  const nbThis7 = db.matches.filter(m => {
    const d = new Date(m.date);
    return (Date.now() - d) < 7 * 86400000;
  }).length;

  kpiGrid.innerHTML = [
    { val: nbMatches, lbl: 'Matchs joués' },
    { val: nbPlayers, lbl: 'Joueurs' },
    { val: leader ? leader.elo : '–', lbl: leader ? `Leader: ${leader.pseudo}` : 'Leader' },
    { val: nbThis7, lbl: 'Matchs cette semaine' }
  ].map(k => `<div class="kpi-card"><div class="kpi-val">${k.val}</div><div class="kpi-lbl">${k.lbl}</div></div>`).join('');

  // ELO Chart
  const ctx = document.getElementById('elo-chart').getContext('2d');
  if (eloChartInstance) eloChartInstance.destroy();

  const datasets = db.players.filter(p => p.eloHistory.length > 1).map(p => ({
    label: p.pseudo,
    data: p.eloHistory.map(h => ({ x: h.match, y: h.elo })),
    borderColor: getOrAssignColor(p),
    backgroundColor: 'transparent',
    borderWidth: 2,
    pointRadius: 3,
    tension: 0.3
  }));

  eloChartInstance = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#9090a8', font: { family: 'DM Sans' } } }
      },
      scales: {
        x: { type: 'linear', ticks: { color: '#5a5a70' }, grid: { color: '#1a1a24' } },
        y: { ticks: { color: '#5a5a70', font: { family: 'JetBrains Mono' } }, grid: { color: '#1a1a24' } }
      }
    }
  });

  // Recent matches
  const recent = [...db.matches].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
  document.getElementById('recent-matches').innerHTML = recent.length
    ? recent.map(m => matchCardHTML(m, false)).join('')
    : '<div class="empty"><div class="icon">⚽</div><p>Aucun match joué pour le moment</p></div>';
}

// ═══════════════════════════════════════════════
//  ADD MATCH
// ═══════════════════════════════════════════════

let matchFormat = '1v1';
let selectedA = []; // {id, role}
let selectedB = [];

function setFormat(fmt) {
  matchFormat = fmt;
  document.getElementById('btn-1v1').classList.toggle('active', fmt === '1v1');
  document.getElementById('btn-2v2').classList.toggle('active', fmt === '2v2');
  selectedA = [];
  selectedB = [];
  renderTeamSelectors();
}

function initAddMatch() {
  // Set default date to now
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('match-date').value = now.toISOString().slice(0, 16);
  document.getElementById('score-a').value = 0;
  document.getElementById('score-b').value = 0;
  document.getElementById('match-comment').value = '';
  document.getElementById('add-match-alert').innerHTML = '';
  selectedA = [];
  selectedB = [];
  renderTeamSelectors();
}

function renderTeamSelectors() {
  const maxPerTeam = matchFormat === '1v1' ? 1 : 2;

  ['a', 'b'].forEach(team => {
    const selected = team === 'a' ? selectedA : selectedB;
    const other = team === 'a' ? selectedB : selectedA;
    const otherIds = other.map(p => p.id);

    let html = `<div style="margin-bottom:10px;font-size:12px;color:var(--text3);">
      Sélectionner ${maxPerTeam === 1 ? '1 joueur' : '2 joueurs'} (${selected.length}/${maxPerTeam})
    </div>`;

    // Selected players display
    if (selected.length > 0) {
      html += `<div style="margin-bottom:10px;">`;
      selected.forEach(sp => {
        const p = db.players.find(x => x.id === sp.id);
        if (!p) return;
        html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);">
          <div class="player-dot" style="background:${getOrAssignColor(p)};width:10px;height:10px;border-radius:50%;flex-shrink:0;"></div>
          <span style="font-size:13px;font-weight:600;flex:1;">${p.pseudo}</span>`;
        if (matchFormat === '2v2') {
          html += `<button class="role-btn atk ${sp.role === 'atk' ? 'active' : ''}" onclick="setRole('${team}','${sp.id}','atk')">⚔ ATQ</button>
          <button class="role-btn def ${sp.role === 'def' ? 'active' : ''}" onclick="setRole('${team}','${sp.id}','def')">🛡 DEF</button>`;
        }
        html += `<button class="btn-icon" onclick="removeFromTeam('${team}','${sp.id}')">✕</button>
        </div>`;
      });
      html += `</div>`;
    }

    // Available players to add
    if (selected.length < maxPerTeam) {
      html += `<div class="player-selector">`;
      db.players.forEach(p => {
        const alreadySelected = selected.find(x => x.id === p.id) || otherIds.includes(p.id);
        if (!alreadySelected) {
          html += `<div class="player-select-chip" onclick="addToTeam('${team}','${p.id}')">
            <div class="pdot" style="background:${getOrAssignColor(p)};"></div>${p.pseudo}
          </div>`;
        }
      });
      if (db.players.every(p => selected.find(x => x.id === p.id) || otherIds.includes(p.id))) {
        html += `<span style="color:var(--text3);font-size:13px;">Tous les joueurs assignés</span>`;
      }
      html += `</div>`;
    }

    document.getElementById(`team-${team}-players`).innerHTML = html;
  });
}

function addToTeam(team, id) {
  const arr = team === 'a' ? selectedA : selectedB;
  const max = matchFormat === '1v1' ? 1 : 2;
  if (arr.length >= max) return;
  arr.push({ id, role: 'atk' });
  renderTeamSelectors();
}

function removeFromTeam(team, id) {
  if (team === 'a') selectedA = selectedA.filter(x => x.id !== id);
  else selectedB = selectedB.filter(x => x.id !== id);
  renderTeamSelectors();
}

function setRole(team, id, role) {
  const arr = team === 'a' ? selectedA : selectedB;
  const sp = arr.find(x => x.id === id);
  if (sp) sp.role = role;
  renderTeamSelectors();
}

function saveMatch(editId = null) {
  const alertEl = document.getElementById('add-match-alert') || document.createElement('div');
  const maxPerTeam = matchFormat === '1v1' ? 1 : 2;

  if (selectedA.length !== maxPerTeam || selectedB.length !== maxPerTeam) {
    showAlert(alertEl, `error`, `Veuillez sélectionner ${maxPerTeam} joueur(s) par équipe.`);
    return;
  }

  const dateVal = document.getElementById('match-date').value;
  if (!dateVal) { showAlert(alertEl, 'error', 'Veuillez choisir une date.'); return; }

  const scoreA = parseInt(document.getElementById('score-a').value) || 0;
  const scoreB = parseInt(document.getElementById('score-b').value) || 0;
  const comment = document.getElementById('match-comment').value.trim();

  const match = {
    id: editId || Date.now().toString(),
    date: new Date(dateVal).toISOString(),
    format: matchFormat,
    teamA: selectedA.map(p => ({ id: p.id, role: p.role || null })),
    teamB: selectedB.map(p => ({ id: p.id, role: p.role || null })),
    scoreA,
    scoreB,
    comment
  };

  if (editId) {
    const idx = db.matches.findIndex(m => m.id === editId);
    if (idx !== -1) db.matches[idx] = match;
  } else {
    db.matches.push(match);
  }

  replayElo();
  save();

  showAlert(alertEl, 'success', editId ? '✅ Match modifié !' : '✅ Match enregistré !');
  if (!editId) {
    setTimeout(() => { selectedA = []; selectedB = []; initAddMatch(); }, 1500);
  } else {
    setTimeout(() => closeModal('modal-edit-match'), 1000);
    renderMatches();
  }
}

// ═══════════════════════════════════════════════
//  MATCHES LIST
// ═══════════════════════════════════════════════

function matchCardHTML(match, showActions = true) {
  const aNames = match.teamA.map(p => {
    const pl = db.players.find(x => x.id === p.id);
    if (!pl) return '?';
    let html = `<span class="player-chip"><span class="player-dot" style="background:${getOrAssignColor(pl)}"></span>${pl.pseudo}`;
    if (match.format === '2v2' && p.role) html += ` <span class="role-badge role-${p.role}">${p.role === 'atk' ? '⚔' : '🛡'}</span>`;
    return html + '</span>';
  }).join('');

  const bNames = match.teamB.map(p => {
    const pl = db.players.find(x => x.id === p.id);
    if (!pl) return '?';
    let html = `<span class="player-chip"><span class="player-dot" style="background:${getOrAssignColor(pl)}"></span>${pl.pseudo}`;
    if (match.format === '2v2' && p.role) html += ` <span class="role-badge role-${p.role}">${p.role === 'atk' ? '⚔' : '🛡'}</span>`;
    return html + '</span>';
  }).join('');

  const winner = match.scoreA > match.scoreB ? 'A' : match.scoreA < match.scoreB ? 'B' : null;
  const scoreColor = match.scoreA > match.scoreB ? 'var(--green)' : match.scoreA < match.scoreB ? 'var(--red)' : 'var(--text2)';

  const dateStr = new Date(match.date).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });

  let actionsHTML = '';
  if (showActions) {
    actionsHTML = `<div class="match-actions">
      <button class="btn-icon" title="Voir ELO" onclick="showEloDetail('${match.id}')">👁</button>
      <button class="btn-icon" title="Modifier" onclick="openEditMatch('${match.id}')">✏️</button>
      <button class="btn-icon" title="Supprimer" onclick="deleteMatch('${match.id}')">🗑</button>
    </div>`;
  }

  return `<div class="match-card" id="match-${match.id}">
    <div>
      <div class="match-date">${dateStr}</div>
      <div style="margin-top:4px;"><span class="stat-pill">${match.format}</span></div>
    </div>
    <div>
      <div class="match-teams">
        <div>${aNames}</div>
        <div class="match-score" style="color:${scoreColor}">${match.scoreA} – ${match.scoreB}</div>
        <div>${bNames}</div>
      </div>
      ${match.comment ? `<div class="match-comment">💬 ${match.comment}</div>` : ''}
    </div>

  </div>`;
}

function renderMatches() {
  const search = (document.getElementById('match-search')?.value || '').toLowerCase();
  const fmt = document.getElementById('match-filter-format')?.value || '';

  let filtered = [...db.matches].sort((a, b) => new Date(b.date) - new Date(a.date));

  if (fmt) filtered = filtered.filter(m => m.format === fmt);
  if (search) {
    filtered = filtered.filter(m => {
      const allIds = [...m.teamA, ...m.teamB].map(p => p.id);
      return allIds.some(id => {
        const pl = db.players.find(x => x.id === id);
        return pl && pl.pseudo.toLowerCase().includes(search);
      });
    });
  }

  document.getElementById('matches-list').innerHTML = filtered.length
    ? filtered.map(m => matchCardHTML(m, true)).join('')
    : '<div class="empty"><div class="icon">📋</div><p>Aucun match trouvé</p></div>';
}

function deleteMatch(id) {
  if (!confirm('Supprimer ce match ?')) return;
  db.matches = db.matches.filter(m => m.id !== id);
  replayElo();
  save();
  renderMatches();
}

function getPlayerStats(playerId) {
  const matches = db.matches.filter(m =>
    m.teamA.some(p => p.id === playerId) || m.teamB.some(p => p.id === playerId)
  );

  let wins = 0, losses = 0, draws = 0;
  let matches1v1 = 0, matches2v2 = 0;
  let defMatches = 0, atkMatches = 0;

  matches.forEach(m => {
    const inA = m.teamA.some(p => p.id === playerId);
    const team = inA ? m.teamA : m.teamB;
    const myScore = inA ? m.scoreA : m.scoreB;
    const oppScore = inA ? m.scoreB : m.scoreA;

    if (myScore > oppScore) wins++;
    else if (myScore < oppScore) losses++;
    else draws++;

    if (m.format === '1v1') matches1v1++;
    else matches2v2++;

    const myEntry = team.find(p => p.id === playerId);
    if (myEntry?.role === 'def') defMatches++;
    else if (myEntry?.role === 'atk') atkMatches++;
  });

  const total = matches.length;
  const winPct = total ? Math.round((wins / total) * 100) : 0;

  return { total, wins, losses, draws, winPct, matches1v1, matches2v2, defMatches, atkMatches };
}

function renderRanking() {
  const sorted = [...db.players].sort((a, b) => b.elo - a.elo);
  const body = document.getElementById('ranking-body');

  if (!sorted.length) {
    body.innerHTML = `<tr><td colspan="8"><div class="empty"><div class="icon">🏆</div><p>Aucun joueur enregistré</p></div></td></tr>`;
    return;
  }

  body.innerHTML = sorted.map((p, i) => {
    const s = getPlayerStats(p.id);
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    return `<tr>
      <td><div class="rank-badge ${rankClass}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</div></td>
      <td><div class="player-name-cell">
        <div class="avatar" style="background:${getOrAssignColor(p)}">${p.pseudo[0].toUpperCase()}</div>
        <span style="font-weight:600;">${p.pseudo}</span>
      </div></td>
      <td><span class="elo-badge">${p.elo}</span></td>
      <td><span class="stat-pill">${s.total}</span></td>
      <td><span class="stat-pill ${s.winPct >= 50 ? 'green' : 'red'}">${s.winPct}%</span></td>
      <td><span class="stat-pill">${s.matches1v1}</span></td>
      <td><span class="stat-pill">${s.matches2v2}</span></td>
      <td><button class="btn-icon" onclick="showPlayerStats('${p.id}')">👁</button></td>
    </tr>`;
  }).join('');
}

let playerStatsChartInstance = null;

function showPlayerStats(playerId) {
  const p = db.players.find(x => x.id === playerId);
  if (!p) return;

  const s = getPlayerStats(playerId);
  const color = getOrAssignColor(p);

  // Best / worst opponent
  const opponentStats = {};
  db.matches.forEach(m => {
    const inA = m.teamA.some(x => x.id === playerId);
    const inB = m.teamB.some(x => x.id === playerId);
    if (!inA && !inB) return;

    const oppTeam = inA ? m.teamB : m.teamA;
    const myScore = inA ? m.scoreA : m.scoreB;
    const oppScore = inA ? m.scoreB : m.scoreA;
    const won = myScore > oppScore;

    oppTeam.forEach(op => {
      if (!opponentStats[op.id]) opponentStats[op.id] = { wins: 0, total: 0 };
      opponentStats[op.id].total++;
      if (won) opponentStats[op.id].wins++;
    });
  });

  let bestOpp = null, worstOpp = null;
  Object.entries(opponentStats).forEach(([id, stat]) => {
    if (stat.total < 1) return;
    const pct = stat.wins / stat.total;
    if (!bestOpp || pct > opponentStats[bestOpp].wins / opponentStats[bestOpp].total) bestOpp = id;
    if (!worstOpp || pct < opponentStats[worstOpp].wins / opponentStats[worstOpp].total) worstOpp = id;
  });

  const bestOppName = bestOpp ? (db.players.find(x => x.id === bestOpp)?.pseudo || '?') : 'N/A';
  const worstOppName = worstOpp ? (db.players.find(x => x.id === worstOpp)?.pseudo || '?') : 'N/A';

  // Player's matches sorted by date
  const playerMatches = [...db.matches].filter(m =>
    m.teamA.some(x => x.id === playerId) || m.teamB.some(x => x.id === playerId)
  ).sort((a, b) => new Date(b.date) - new Date(a.date));

  const html = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
      <div class="avatar" style="background:${color};width:54px;height:54px;font-size:24px;">${p.pseudo[0].toUpperCase()}</div>
      <div>
        <div style="font-family:'Bebas Neue';font-size:28px;letter-spacing:1px;">${p.pseudo}</div>
        <div class="elo-badge">${p.elo} ELO</div>
      </div>
    </div>

    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchModalTab(this,'tab-stats-${playerId}')">📊 Stats</button>
      <button class="modal-tab" onclick="switchModalTab(this,'tab-elo-${playerId}')">📈 ELO</button>
      <button class="modal-tab" onclick="switchModalTab(this,'tab-matches-${playerId}')">🎮 Matchs</button>
    </div>

    <div id="tab-stats-${playerId}" class="modal-tab-content active">
      <div class="stats-grid">
        ${[
          { val: s.total, lbl: 'Matchs joués' },
          { val: s.wins, lbl: 'Victoires' },
          { val: s.losses, lbl: 'Défaites' },
          { val: s.draws, lbl: 'Nuls' },
          { val: s.winPct + '%', lbl: 'Win rate' },
          { val: s.matches1v1, lbl: 'Matchs 1v1' },
          { val: s.matches2v2, lbl: 'Matchs 2v2' },
          { val: s.atkMatches, lbl: 'En attaque' },
          { val: s.defMatches, lbl: 'En défense' },
          { val: p.elo, lbl: 'ELO actuel' }
        ].map(st => `<div class="stat-box"><div class="val">${st.val}</div><div class="lbl">${st.lbl}</div></div>`).join('')}
      </div>
      <div class="card" style="padding:16px;">
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
          <div>
            <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;">✅ Meilleur adversaire</div>
            <div style="font-weight:700;font-size:16px;">${bestOppName}</div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;">❌ Adversaire difficile</div>
            <div style="font-weight:700;font-size:16px;">${worstOppName}</div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-elo-${playerId}" class="modal-tab-content">
      <div style="position:relative;height:260px;">
        <canvas id="player-elo-chart-${playerId}"></canvas>
      </div>
    </div>

    <div id="tab-matches-${playerId}" class="modal-tab-content">
      <div style="max-height:400px;overflow-y:auto;">
        ${playerMatches.length ? playerMatches.map(m => matchCardHTML(m, true)).join('') : '<div class="empty"><p>Aucun match</p></div>'}
      </div>
    </div>
  `;

  document.getElementById('player-stats-content').innerHTML = html;
  openModal('modal-player-stats');

  // Draw chart after modal open
  setTimeout(() => {
    const canvas = document.getElementById(`player-elo-chart-${playerId}`);
    if (!canvas) return;
    if (playerStatsChartInstance) playerStatsChartInstance.destroy();

    const hist = p.eloHistory || [];
    playerStatsChartInstance = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {
        labels: hist.map((h, i) => i === 0 ? 'Début' : `M${h.match}`),
        datasets: [{
          label: 'ELO',
          data: hist.map(h => h.elo),
          borderColor: color,
          backgroundColor: color + '20',
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#5a5a70' }, grid: { color: '#1a1a24' } },
          y: { ticks: { color: '#5a5a70', font: { family: 'JetBrains Mono' } }, grid: { color: '#1a1a24' } }
        }
      }
    });
  }, 100);
}

function switchModalTab(btn, tabId) {
  const modal = btn.closest('.modal');
  modal.querySelectorAll('.modal-tab').forEach(b => b.classList.remove('active'));
  modal.querySelectorAll('.modal-tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId)?.classList.add('active');
}

let pendingAdminAction = null;

function promptDelete(playerId) {
  pendingAdminAction = () => {
    db.players = db.players.filter(p => p.id !== playerId);
    db.matches = db.matches.filter(m => !m.teamA.some(p => p.id === playerId) && !m.teamB.some(p => p.id === playerId));
    replayElo();
    save();
    renderPlayers();
    renderRanking?.();
  };
  document.getElementById('admin-password').value = '';
  document.getElementById('admin-alert').innerHTML = '';
  openModal('modal-admin');
}

function promptRename(playerId) {
  pendingAdminAction = (newName) => {
    const p = db.players.find(x => x.id === playerId);
    if (p) { p.pseudo = newName; save(); renderPlayers(); }
  };
  pendingAdminAction._needsName = true;
  document.getElementById('admin-password').value = '';
  document.getElementById('admin-alert').innerHTML = '';
  openModal('modal-admin');
}

function confirmAdmin() {
  const pwd = document.getElementById('admin-password').value;
  const alertEl = document.getElementById('admin-alert');
  if (pwd !== ADMIN_PASSWORD) {
    showAlert(alertEl, 'error', 'Mot de passe incorrect.'); return;
  }
  closeModal('modal-admin');
  if (pendingAdminAction?._needsName) {
    openModal('modal-rename');
    document.getElementById('rename-input').value = '';
  } else if (pendingAdminAction) {
    pendingAdminAction();
    pendingAdminAction = null;
  }
}

function confirmRename() {
  const newName = document.getElementById('rename-input').value.trim();
  if (!newName) return;
  if (pendingAdminAction) {
    pendingAdminAction(newName);
    pendingAdminAction = null;
  }
  closeModal('modal-rename');
}

function exportCSV() {
  const rows = [['id','date','format','teamA_player1','teamA_p1_role','teamA_player2','teamA_p2_role',
    'teamB_player1','teamB_p1_role','teamB_player2','teamB_p2_role',
    'scoreA','scoreB','winner','comment',
    'eloA1_before','eloA1_after','eloA2_before','eloA2_after',
    'eloB1_before','eloB1_after','eloB2_before','eloB2_after']];

  db.matches.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(m => {
    const getName = id => db.players.find(p => p.id === id)?.pseudo || id;
    const snap = m._eloSnapshot || { A: [], B: [] };

    const a1 = m.teamA[0] || {};
    const a2 = m.teamA[1] || {};
    const b1 = m.teamB[0] || {};
    const b2 = m.teamB[1] || {};
    const sa1 = snap.A[0] || {};
    const sa2 = snap.A[1] || {};
    const sb1 = snap.B[0] || {};
    const sb2 = snap.B[1] || {};

    rows.push([
      m.id, m.date, m.format,
      getName(a1.id), a1.role || '',
      getName(a2.id), a2.role || '',
      getName(b1.id), b1.role || '',
      getName(b2.id), b2.role || '',
      m.scoreA, m.scoreB,
      m.scoreA > m.scoreB ? 'A' : m.scoreB > m.scoreA ? 'B' : 'draw',
      (m.comment || '').replace(/,/g, ';'),
      sa1.eloBefore || '', sa1.eloAfter || '',
      sa2.eloBefore || '', sa2.eloAfter || '',
      sb1.eloBefore || '', sb1.eloAfter || '',
      sb2.eloBefore || '', sb2.eloAfter || ''
    ]);
  });

  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `babyfoot_matches_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
